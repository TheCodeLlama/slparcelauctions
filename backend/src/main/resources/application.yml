server:
  port: 8080
  # Spring's ForwardedHeaderFilter resolves X-Forwarded-For into
  # getRemoteAddr(). This is only safe when the deployment sits behind a
  # trusted reverse proxy (e.g. Cloudflare, AWS ALB, nginx) that overwrites
  # or strips client-supplied X-Forwarded-For headers. Local dev without a
  # proxy falls back to the socket peer address, which is correct.
  # Production deployments MUST front the app with a scrubbing proxy.
  forward-headers-strategy: framework

spring:
  application:
    name: slpa-backend
  # The community bucket4j-spring-boot-starter (com.giffing.*) targets Spring
  # Boot 3 and references org.springframework.boot.autoconfigure.cache.
  # CacheAutoConfiguration, which moved to org.springframework.boot.cache.
  # autoconfigure.* in Spring Boot 4. We pull the starter for its programmatic
  # API only — the rate-limit bucket on /auctions/search is wired manually via
  # Lettuce in a later Epic 07 task. Excluding the auto-configs prevents the
  # broken @ConditionalOnClass chain from breaking application context startup.
  autoconfigure:
    exclude:
      - com.giffing.bucket4j.spring.boot.starter.Bucket4jStartupCheckConfiguration
      - com.giffing.bucket4j.spring.boot.starter.config.cache.Bucket4jCacheConfiguration
      - com.giffing.bucket4j.spring.boot.starter.config.aspect.Bucket4jAopConfig
      - com.giffing.bucket4j.spring.boot.starter.config.filter.reactive.gateway.Bucket4JAutoConfigurationSpringCloudGatewayFilter
      - com.giffing.bucket4j.spring.boot.starter.config.filter.servlet.Bucket4JAutoConfigurationServletFilter
      - com.giffing.bucket4j.spring.boot.starter.config.filter.reactive.webflux.Bucket4JAutoConfigurationWebfluxFilter
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update # was: validate (suspended until users exist; breaking changes wipe DB)
  flyway:
    enabled: true
    baseline-on-migrate: true   # safety net for any existing dev DB someone forgets to wipe; first prod deploy starts empty
    baseline-version: 0         # baseline at 0 so V1 runs on a fresh schema (default is 1, which would skip V1)
  servlet:
    multipart:
      # Sized so Spring's multipart layer rejects pathologically large
      # uploads before they reach the central ImageStorageService chokepoint
      # (which buffers up to 16 MB then magic-byte-sniffs + decodes).
      # The user-facing UI never surfaces "too big" copy — these are JVM-OOM
      # guards for clients that bypass the client-side resize.
      max-file-size: 25MB
      max-request-size: 30MB
  jackson:
    deserialization:
      # SECURITY: reject unknown fields in every request body globally. This is a
      # defense-in-depth measure against privilege escalation via field injection
      # (e.g. a client sneaking {"role":"admin"} into PUT /me). Spring Boot's
      # default is false; we override it to true. Per-DTO @JsonIgnoreProperties
      # annotations document the intent but do NOT by themselves re-enable
      # FAIL_ON_UNKNOWN_PROPERTIES — the global flag is load-bearing. See the
      # security canary test
      # UserControllerUpdateMeSliceTest.put_me_rejectsUnknownFields_returns400.
      fail-on-unknown-properties: true

cors:
  allowed-origin: http://localhost:3000

jwt:
  secret: ${JWT_SECRET}             # no default — fail-fast on prod startup if missing
  access-token-lifetime: PT15M      # ISO-8601 duration: 15 minutes
  refresh-token-lifetime: P7D       # ISO-8601 duration: 7 days

auth:
  cleanup:
    enabled: true

slpa:
  system:
    # Internal user id that scheduled jobs stamp on rows where the data model requires
    # a user FK but no human admin took the action. Resolved via SystemUserResolver.
    # Default 1 maps to the seed admin created by UserBootstrap on a fresh DB (the
    # users.id sequence starts at 1).
    user-id: 1
  sl:
    expected-shard: Production
    trusted-owner-keys: []
  verification:
    parcel-code-ttl-minutes: 15
    parcel-code-expiry-check-interval: PT5M
  bot:
    # Bearer token for the bot worker → backend authentication (Epic 06 Task 3).
    # No default — non-dev profiles MUST override via SLPA_BOT_SHARED_SECRET.
    # BotStartupValidator fails fast on blank, placeholder, or sub-16-char values.
    # Dev profile supplies a placeholder in application-dev.yml.
    shared-secret: ${SLPA_BOT_SHARED_SECRET:}
  bot-task:
    # SLPAEscrow Resident avatar UUID. Dev placeholder; production overrides
    # via env var. This is the SLPArcels-owned receiving wallet avatar used
    # by the payment terminal flow. BotStartupValidator fails fast on non-dev
    # profiles if the value is still the dev placeholder.
    primary-escrow-uuid: ${SLPA_PRIMARY_ESCROW_UUID:00000000-0000-0000-0000-000000000099}
    # Bot-task scheduler tunables retained as future-extension scaffolding —
    # the verification + monitor task types they originally drove are retired
    # (spec 2026-05-16); the BotTaskService.claim + findPending surfaces stay
    # in place so a future task type (e.g. WITHDRAW_GROUP) can plug in
    # without re-wiring the timeout sweeper.
    timeout: PT48H
    in-progress-timeout: PT20M
    timeout-hours: 48
    timeout-check-interval: PT15M
  storage:
    bucket: slpa-uploads
    region: us-east-1
    path-style-access: false
  world-api:
    base-url: https://world.secondlife.com
    timeout-ms: 10000
    retry-attempts: 3
    retry-backoff-ms: 500
  listing-fee:
    amount-lindens: 100
  commission:
    default-rate: 0.05
  cancellation:
    # Epic 08 sub-spec 2 §2 — cancellation-penalty ladder. Applied only when
    # an ACTIVE auction with at least one bid is cancelled. Walking the ladder
    # is keyed off the seller's count of prior cancelled-with-bids log rows.
    penalty:
      second-offense-l: 1000
      third-offense-l: 2500
      third-offense-suspension-days: 30
    # Sub-spec 2 §6 — post-cancel ownership watcher window. The ownership
    # monitor scans cancelled auctions whose watch deadline is still in the
    # future and raises CANCEL_AND_SELL if the parcel ownership flips to a
    # non-seller avatar within the window.
    post-cancel-watch-hours: 48
  photos:
    max-per-listing: 10
    # Server-side caps for ListingPhotoProcessor, applied to both listing-photo
    # and user default-cover uploads. The frontend resizes via
    # browser-image-compression before sending; these are the defense-in-depth
    # backstop for clients that bypass the resize. 2048px on the longest edge
    # is the display-quality target; 25MB protects the JVM from decode-OOM if
    # someone POSTs an unresized 50MP RAW.
    max-bytes: 26214400
    max-dimension: 2048
  ownership-monitor:
    enabled: true
    check-interval-minutes: 30
    scheduler-frequency: PT30S
    jitter-max-minutes: 5
  auction-end:
    enabled: true
    scheduler-frequency: PT15S
  escrow:
    # No default — must be set via SLPA_ESCROW_TERMINAL_SHARED_SECRET in
    # non-dev profiles. EscrowStartupValidator fails fast if missing or
    # shorter than 16 characters. Dev profile overrides this in
    # application-dev.yml.
    terminal-shared-secret: ${SLPA_ESCROW_TERMINAL_SHARED_SECRET:}
    terminal-live-window: PT15M
    command-in-flight-timeout: PT5M
    ownership-api-failure-threshold: 5
    ownership-reminder-delay: PT24H
    sell-to-bot-recurrence: PT30M
    # Fast retry for transient bot outcomes (BOT_ERROR / ACCESS_DENIED) only —
    # the parcel is fine, the bot just couldn't observe it, so re-check soon
    # instead of waiting a full recurrence interval. PARCEL_NOT_FOUND and
    # definitive negatives stay on sell-to-bot-recurrence.
    sell-to-bot-retry-backoff: PT2M
    sell-to-bot-failure-threshold: 5
    buy-parcel-fast-cadence: PT5M
    buy-parcel-fast-window: PT1H
    buy-parcel-slow-cadence: PT30M
    manual-verify-attempts: 3
    # --- Scheduled job cadences (Tasks 6/7/8/9 wire the actual jobs) ---
    timeout-job:
      enabled: true
      fixed-delay: PT5M
    ownership-monitor-job:
      enabled: true
      fixed-delay: PT5M
    command-dispatcher-job:
      enabled: true
      fixed-delay: PT30S
    listing-fee-refund-job:
      enabled: true
      fixed-delay: PT1M
  notifications:
    cleanup:
      enabled: true
      cron: "0 30 3 * * *"        # 3:30 AM UTC daily
      retention-days: 90
      batch-size: 1000
    sl-im:
      dispatcher:
        # Shared secret for the SL IM terminal polling endpoints.
        # No default — non-dev profiles MUST override via SL_IM_DISPATCHER_SECRET.
        # Dev profile supplies a placeholder in application-dev.yml.
        shared-secret: ${SL_IM_DISPATCHER_SECRET:dev-only-secret-do-not-use-in-prod}
        max-batch-limit: 50
      cleanup:
        enabled: true
        cron: "0 30 3 * * *"        # 03:30 daily, zone = America/Los_Angeles
        expiry-after-hours: 48
        retention-after-days: 30
        batch-size: 1000
        top-users-in-log: 10
  admin:
    bootstrap-usernames:
      - Heath Onyx
  web:
    base-url: ${SLPA_WEB_BASE_URL:http://localhost:3000}
  realty:
    # Sub-project F (admin moderation). Bound to RealtyGroupModerationProperties.
    # See spec §20.2 for the knob semantics; each `enabled` flag is a kill-switch
    # for its scheduled task and gets flipped off via @TestPropertySource in
    # integration tests, consistent with the codebase-wide scheduler-disable
    # pattern.
    group-bulk-suspend:
      auto-cancel-hours: 48
      enabled: true
    sl-group:
      reverify-cadence-days: 30
      reverify-fetch-failure-threshold: 3
      reverify:
        enabled: true
    group-suspension-expiry:
      enabled: true
    # Sub-project H section 6 -- per-call ceiling on member-initiated deposits into a
    # realty group's wallet (app flow + in-world flow). Fat-finger protection only;
    # the depositor's personal balance and walking-around L$ are the natural caps.
    # Ops can lift via env var for known high-volume venues.
    group-deposit-max-l: 500000
  reports:
    # Sub-project G section 12 -- threshold of open user-submitted reports against
    # a single realty group before the admin fan-out notification fires. Bound to
    # ReportsProperties (slpa.reports.*). One-shot per cycle: re-arms when the
    # open count returns to zero. Default 3; minimum 1.
    group-alert-threshold: 3
