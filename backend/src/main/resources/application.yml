server:
  port: 8080
  # Spring's ForwardedHeaderFilter resolves X-Forwarded-For into
  # getRemoteAddr(). This is only safe when the deployment sits behind a
  # trusted reverse proxy (e.g. Cloudflare, AWS ALB, nginx) that overwrites
  # or strips client-supplied X-Forwarded-For headers. Local dev without a
  # proxy falls back to the socket peer address, which is correct.
  # Production deployments MUST front the app with a scrubbing proxy.
  forward-headers-strategy: framework

spring:
  application:
    name: slpa-backend
  # The community bucket4j-spring-boot-starter (com.giffing.*) targets Spring
  # Boot 3 and references org.springframework.boot.autoconfigure.cache.
  # CacheAutoConfiguration, which moved to org.springframework.boot.cache.
  # autoconfigure.* in Spring Boot 4. We pull the starter for its programmatic
  # API only — the rate-limit bucket on /auctions/search is wired manually via
  # Lettuce in a later Epic 07 task. Excluding the auto-configs prevents the
  # broken @ConditionalOnClass chain from breaking application context startup.
  autoconfigure:
    exclude:
      - com.giffing.bucket4j.spring.boot.starter.Bucket4jStartupCheckConfiguration
      - com.giffing.bucket4j.spring.boot.starter.config.cache.Bucket4jCacheConfiguration
      - com.giffing.bucket4j.spring.boot.starter.config.aspect.Bucket4jAopConfig
      - com.giffing.bucket4j.spring.boot.starter.config.filter.reactive.gateway.Bucket4JAutoConfigurationSpringCloudGatewayFilter
      - com.giffing.bucket4j.spring.boot.starter.config.filter.servlet.Bucket4JAutoConfigurationServletFilter
      - com.giffing.bucket4j.spring.boot.starter.config.filter.reactive.webflux.Bucket4JAutoConfigurationWebfluxFilter
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
  flyway:
    enabled: false
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 10MB
  jackson:
    deserialization:
      # SECURITY: reject unknown fields in every request body globally. This is a
      # defense-in-depth measure against privilege escalation via field injection
      # (e.g. a client sneaking {"role":"admin"} into PUT /me). Spring Boot's
      # default is false; we override it to true. Per-DTO @JsonIgnoreProperties
      # annotations document the intent but do NOT by themselves re-enable
      # FAIL_ON_UNKNOWN_PROPERTIES — the global flag is load-bearing. See the
      # security canary test
      # UserControllerUpdateMeSliceTest.put_me_rejectsUnknownFields_returns400.
      fail-on-unknown-properties: true

cors:
  allowed-origin: http://localhost:3000

jwt:
  secret: ${JWT_SECRET}             # no default — fail-fast on prod startup if missing
  access-token-lifetime: PT15M      # ISO-8601 duration: 15 minutes
  refresh-token-lifetime: P7D       # ISO-8601 duration: 7 days

auth:
  cleanup:
    enabled: true

slpa:
  sl:
    expected-shard: Production
    trusted-owner-keys: []
  verification:
    parcel-code-ttl-minutes: 15
    parcel-code-expiry-check-interval: PT5M
  bot:
    # Bearer token for the bot worker → backend authentication (Epic 06 Task 3).
    # No default — non-dev profiles MUST override via SLPA_BOT_SHARED_SECRET.
    # BotStartupValidator fails fast on blank, placeholder, or sub-16-char values.
    # Dev profile supplies a placeholder in application-dev.yml.
    shared-secret: ${SLPA_BOT_SHARED_SECRET:}
    # MONITOR_AUCTION cadence — how often each ACTIVE+VERIFIED auction is
    # re-checked to confirm the escrow still owns the parcel.
    monitor-auction-interval: PT30M
    # MONITOR_ESCROW cadence — parcels the escrow owns but that aren't in an
    # active auction (safety net for orphaned parcels).
    monitor-escrow-interval: PT15M
    # Consecutive ACCESS_DENIED observations before raising an operator alert.
    access-denied-streak-threshold: 3
    # Rate limit for bot teleports to avoid tripping SL anti-abuse heuristics.
    teleports-per-minute: 6
  bot-task:
    # Sentinel sale price (L$) that the seller must set on the parcel-for-sale
    # object in-world. Deliberately large so no human would pick it by accident
    # but cheap to transact (the bot never actually buys).
    sentinel-price-lindens: 999999999
    # SLPAEscrow Resident avatar UUID. Dev placeholder; production overrides
    # via env var. This is the "buyer" the seller must target in the parcel
    # sale UI for the bot to recognize the listing.
    primary-escrow-uuid: ${SLPA_PRIMARY_ESCROW_UUID:00000000-0000-0000-0000-000000000099}
    # Typed PENDING-task timeout. Consumed by BotTaskConfigProperties (Task 3+)
    # alongside the legacy timeout-hours @Value read below — the latter is
    # migrated to this record in Task 12.
    timeout: PT48H
    # IN_PROGRESS timeout: claimed tasks that don't callback within this
    # window are flipped back to PENDING so another worker can pick them up
    # (Task 4 wires the sweeper).
    in-progress-timeout: PT20M
    # If a PENDING bot task is not picked up + completed within this window,
    # BotTaskTimeoutJob fails it and flips the auction to VERIFICATION_FAILED.
    timeout-hours: 48
    # BotTaskTimeoutJob polling cadence.
    timeout-check-interval: PT15M
  storage:
    bucket: slpa-uploads
    region: us-east-1
    path-style-access: false
  world-api:
    base-url: https://world.secondlife.com
    timeout-ms: 10000
    retry-attempts: 3
    retry-backoff-ms: 500
  map-api:
    base-url: https://cap.secondlife.com
    cap-uuid: b713fe80-283b-4585-af4d-a3b7d9a32492
    timeout-ms: 5000
    retry-attempts: 3
    retry-backoff-ms: 500
  listing-fee:
    amount-lindens: 100
  commission:
    default-rate: 0.05
  photos:
    max-per-listing: 10
    max-bytes: 2097152
    max-dimension: 4096
  ownership-monitor:
    enabled: true
    check-interval-minutes: 30
    scheduler-frequency: PT30S
    jitter-max-minutes: 5
  auction-end:
    enabled: true
    scheduler-frequency: PT15S
  escrow:
    # No default — must be set via SLPA_ESCROW_TERMINAL_SHARED_SECRET in
    # non-dev profiles. EscrowStartupValidator fails fast if missing or
    # shorter than 16 characters. Dev profile overrides this in
    # application-dev.yml.
    terminal-shared-secret: ${SLPA_ESCROW_TERMINAL_SHARED_SECRET:}
    terminal-live-window: PT15M
    command-in-flight-timeout: PT5M
    ownership-api-failure-threshold: 5
    ownership-reminder-delay: PT24H
    # --- Scheduled job cadences (Tasks 6/7/8/9 wire the actual jobs) ---
    timeout-job:
      enabled: true
      fixed-delay: PT5M
    ownership-monitor-job:
      enabled: true
      fixed-delay: PT5M
    command-dispatcher-job:
      enabled: true
      fixed-delay: PT30S
    listing-fee-refund-job:
      enabled: true
      fixed-delay: PT1M
