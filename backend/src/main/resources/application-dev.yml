spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/slpa
    username: slpa
    password: slpa
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
          batch_size: 25
        order_inserts: true
        order_updates: true

cors:
  allowed-origin: http://localhost:3000

jwt:
  # DEV ONLY — production reads jwt.secret from JWT_SECRET env var.
  # This default must never ship to prod.
  # 32 bytes (256 bits) base64-encoded.
  # Regenerate via: openssl rand -base64 32
  secret: ZBSX2l2kgZbvm6v0T3XGA09gNFLVxx2dfG0SyIqqQaE=

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

slpa:
  sl:
    trusted-owner-keys:
      - "00000000-0000-0000-0000-000000000001"
