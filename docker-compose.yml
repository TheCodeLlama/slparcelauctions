name: slpa

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-slpa}
      POSTGRES_USER: ${POSTGRES_USER:-slpa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slpa}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-slpa} -d ${POSTGRES_DB:-slpa}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - slpa-net

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - slpa-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-slpa}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-slpa}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-slpa}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend/src:/workspace/src
      - ./backend/pom.xml:/workspace/pom.xml
      - ./backend/.mvn:/workspace/.mvn
      - ./backend/mvnw:/workspace/mvnw
      - maven-cache:/root/.m2
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    networks:
      - slpa-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - frontend-next-cache:/app/.next
    networks:
      - slpa-net

volumes:
  postgres-data:
  redis-data:
  maven-cache:
  frontend-node-modules:
  frontend-next-cache:

networks:
  slpa-net:
    driver: bridge
