name: slpa

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-slpa}
      POSTGRES_USER: ${POSTGRES_USER:-slpa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slpa}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-slpa} -d ${POSTGRES_DB:-slpa}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - slpa-net

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - slpa-net

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-slpa-dev-key}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-slpa-dev-secret}
    ports:
      - "${MINIO_S3_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - slpa-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-slpa}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-slpa}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-slpa}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost:3000}
      SLPA_STORAGE_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-slpa-dev-key}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-slpa-dev-secret}
      # Bot + escrow integration — backend validates bot callbacks against this UUID
      # and gates /api/v1/bot/** with this shared secret. Both have dev-profile
      # defaults in application-dev.yml; override via shell/env to test real SL
      # integration. See docs/testing/EPIC_6_TESTING.md §3.3-§3.4.
      SLPA_PRIMARY_ESCROW_UUID: ${SLPA_PRIMARY_ESCROW_UUID:-00000000-0000-0000-0000-000000000099}
      SLPA_BOT_SHARED_SECRET: ${SLPA_BOT_SHARED_SECRET:-dev-bot-shared-secret}
      # Optional timing overrides (useful for §10/§13 tests to shrink cycle + sweep).
      # Map to Spring keys: slpa.bot.monitor-*-interval, slpa.bot-task.in-progress-timeout,
      # slpa.bot-task.timeout-check-interval. Defaults in application.yml apply if unset.
      SLPA_BOT_MONITOR_AUCTION_INTERVAL: ${SLPA_BOT_MONITOR_AUCTION_INTERVAL:-PT30M}
      SLPA_BOT_MONITOR_ESCROW_INTERVAL: ${SLPA_BOT_MONITOR_ESCROW_INTERVAL:-PT15M}
      SLPA_BOT_TASK_IN_PROGRESS_TIMEOUT: ${SLPA_BOT_TASK_IN_PROGRESS_TIMEOUT:-PT20M}
      SLPA_BOT_TASK_TIMEOUT_CHECK_INTERVAL: ${SLPA_BOT_TASK_TIMEOUT_CHECK_INTERVAL:-PT15M}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend/src:/workspace/src
      - ./backend/pom.xml:/workspace/pom.xml
      - ./backend/.mvn:/workspace/.mvn
      - ./backend/mvnw:/workspace/mvnw
      - maven-cache:/root/.m2
    # start_period: 60s breakdown — JVM cold start (~3s) + Spring context init
    # (~5s) + Tomcat bind (~1s) + Flyway migrate (~1s on a fresh DB) gives ~10s
    # in the warm-cache case. The remaining headroom covers slow Docker Desktop
    # disk I/O on Windows. The very first boot also has to download Maven
    # dependencies (~45s on a cold maven-cache volume); that runs *before* the
    # JVM starts, so it eats start_period instead of being a separate concern.
    # If you blow away the maven-cache volume regularly, bump this back to 90s.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - slpa-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - frontend-next-cache:/app/.next
    networks:
      - slpa-net

  bot-1:
    build:
      context: ./bot
      dockerfile: Dockerfile
    env_file:
      - ./bot/.env.bot-1
    environment:
      Bot__Username: ${SLPA_BOT_USERNAME}
      Bot__Password: ${SLPA_BOT_PASSWORD}
      Bot__BotUuid: ${SLPA_BOT_UUID}
      Bot__StartLocation: ${SLPA_BOT_START_LOCATION:-last}
      Backend__BaseUrl: http://backend:8080
      Backend__SharedSecret: ${SLPA_BOT_SHARED_SECRET}
      RateLimit__TeleportsPerMinute: "6"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - slpa-net
    # Add bot-2..bot-5 by copying this block and referencing
    # ./bot/.env.bot-2, ./bot/.env.bot-3, etc.

volumes:
  postgres-data:
  redis-data:
  maven-cache:
  frontend-node-modules:
  frontend-next-cache:
  minio-data:

networks:
  slpa-net:
    driver: bridge
