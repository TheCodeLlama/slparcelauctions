<div class="mt-2 text-xs uppercase tracking-widest text-on-surface-variant font-label">The Digital Curator</div>
</div>

<input class="w-full bg-surface-container-low border-0 border-b border-outline-variant/30 py-3 pl-8 focus:ring-0 focus:border-primary transition-colors text-on-surface placeholder:text-outline/50" id="email" name="email" placeholder="curator@luminous.estate" required="" type="email"/>
</div>
</div>
<div class="pt-4">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-2" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-10 pt-8 border-t border-outline-variant/10 text-center">
<a class="inline-flex items-center gap-2 text-sm font-semibold text-on-surface-variant hover:text-primary transition-colors duration-200" href="/signin">
<span class="material-symbols-outlined text-base" data-icon="keyboard_backspace">keyboard_backspace</span>
